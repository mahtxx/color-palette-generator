<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e4e4f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.75rem;
      height: 60px;
      background: #0f0f1a;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hint {
      font-size: 0.72rem;
      color: #44445a;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    kbd {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      color: #666680;
    }

    select {
      background: #1a1a28;
      border: 1px solid rgba(255,255,255,0.08);
      color: #e4e4f0;
      padding: 7px 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:hover { border-color: rgba(124,58,237,0.4); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: #888;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-ghost:hover { background: rgba(255,255,255,0.1); color: #ddd; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(124,58,237,0.4);
    }

    /* Palette */
    .palette {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .swatch {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 2.5rem;
      position: relative;
      cursor: pointer;
      transition: flex 0.35s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }

    .swatch:hover { flex: 1.35; }

    .swatch-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 1.8rem;
    }

    .swatch-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .swatch:hover .swatch-actions {
      opacity: 1;
      transform: translateY(0);
    }

    .swatch-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(6px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .swatch-btn:hover { background: rgba(0,0,0,0.48); transform: scale(1.1); }
    .swatch-btn.locked { background: rgba(255,255,255,0.28); }

    .hex-label {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 8px;
      background: rgba(0,0,0,0.22);
      backdrop-filter: blur(4px);
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .rgb-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 3px 10px;
      margin-top: 4px;
      border-radius: 6px;
      background: rgba(0,0,0,0.18);
      backdrop-filter: blur(4px);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .swatch:hover .rgb-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a28;
      border: 1px solid rgba(124,58,237,0.35);
      color: #a78bfa;
      padding: 9px 20px;
      border-radius: 100px;
      font-size: 0.82rem;
      font-weight: 600;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .hint { display: none; }
      .palette { flex-direction: column; }
      .swatch { flex: 1 !important; min-height: 80px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13.5" cy="6.5" r="2.5"></circle><circle cx="6.5" cy="13.5" r="2.5"></circle>
        <circle cx="17.5" cy="17.5" r="2.5"></circle><circle cx="6" cy="6" r="2"></circle>
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z" opacity="0.3"></path>
      </svg>
      Palette Generator
    </div>
    <div class="topbar-right">
      <span class="hint">Press <kbd>Space</kbd> to generate</span>
      <select id="modeSelect">
        <option value="random">Random</option>
        <option value="analogous">Analogous</option>
        <option value="complementary">Complementary</option>
        <option value="triadic">Triadic</option>
        <option value="pastel">Pastel</option>
        <option value="dark">Deep Dark</option>
        <option value="neon">Neon</option>
      </select>
      <button class="btn btn-ghost" id="exportBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export
      </button>
      <button class="btn btn-primary" id="genBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Generate
      </button>
    </div>
  </div>

  <div class="palette" id="palette"></div>
  <div class="toast" id="toast"></div>

<script>
  let locked  = [false, false, false, false, false];
  let colors  = [];

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => {
      const k = (n + h / 30) % 12;
      const c = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      return Math.round(255 * c).toString(16).padStart(2, '0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r, g, b};
  }

  function contrastColor(hex) {
    const {r,g,b} = hexToRgb(hex);
    return (0.299*r + 0.587*g + 0.114*b) > 128 ? '#111' : '#fff';
  }

  function rnd(min, max) { return min + Math.random() * (max - min); }

  function buildPalette() {
    const mode = document.getElementById('modeSelect').value;
    const base = Math.random() * 360;
    const next = [];

    if (mode === 'analogous') {
      for (let i = 0; i < 5; i++) {
        const h = (base + (i - 2) * 28 + 360) % 360;
        next.push(hslToHex(h, rnd(55,75), rnd(38,58)));
      }
    } else if (mode === 'complementary') {
      const hues = [base, (base+15)%360, (base+180)%360, (base+195)%360, (base+8)%360];
      hues.forEach((h,i) => next.push(hslToHex(h, rnd(50,70), 35 + i * 6)));
    } else if (mode === 'triadic') {
      const tri = [base, (base+120)%360, (base+240)%360, (base+10)%360, (base+130)%360];
      tri.forEach(h => next.push(hslToHex(h, rnd(50,68), rnd(38,55))));
    } else if (mode === 'pastel') {
      for (let i = 0; i < 5; i++) {
        next.push(hslToHex((base + i * 65) % 360, rnd(55,72), rnd(72,84)));
      }
    } else if (mode === 'dark') {
      for (let i = 0; i < 5; i++) {
        next.push(hslToHex((base + i * 55) % 360, rnd(50,70), rnd(12,26)));
      }
    } else if (mode === 'neon') {
      for (let i = 0; i < 5; i++) {
        next.push(hslToHex((base + i * 70) % 360, 100, rnd(48,60)));
      }
    } else {
      for (let i = 0; i < 5; i++) {
        next.push(hslToHex(Math.random()*360, rnd(45,80), rnd(30,62)));
      }
    }

    if (!colors.length) {
      colors = next;
    } else {
      colors = colors.map((c, i) => locked[i] ? c : next[i]);
    }
    render();
  }

  function render() {
    const palette = document.getElementById('palette');
    palette.innerHTML = colors.map((hex, i) => {
      const fg   = contrastColor(hex);
      const {r,g,b} = hexToRgb(hex);
      const lockIcon = locked[i]
        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`
        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`;
      return `
        <div class="swatch" style="background:${hex}" onclick="copySwatch(${i})">
          <div class="swatch-overlay">
            <div class="swatch-actions">
              <button class="swatch-btn ${locked[i]?'locked':''}" onclick="toggleLock(event,${i})" title="${locked[i]?'Unlock':'Lock color'}">${lockIcon}</button>
            </div>
          </div>
          <div class="hex-label" style="color:${fg}">${hex.toUpperCase()}</div>
          <div class="rgb-label" style="color:${fg}">rgb(${r}, ${g}, ${b})</div>
        </div>`;
    }).join('');
  }

  function toggleLock(e, i) {
    e.stopPropagation();
    locked[i] = !locked[i];
    render();
  }

  function copySwatch(i) {
    navigator.clipboard.writeText(colors[i].toUpperCase()).then(() => toast(`Copied ${colors[i].toUpperCase()}`));
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2000);
  }

  document.getElementById('genBtn').addEventListener('click', buildPalette);
  document.getElementById('modeSelect').addEventListener('change', buildPalette);
  document.getElementById('exportBtn').addEventListener('click', () => {
    const text = colors.map(c => c.toUpperCase()).join('\n');
    navigator.clipboard.writeText(text).then(() => toast('All colors copied!'));
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
      e.preventDefault();
      buildPalette();
    }
  });

  buildPalette();
</script>
</body>
</html>
